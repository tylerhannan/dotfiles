name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ubuntu-latest ships with shellcheck preinstalled. Reuse the same hook
      # that runs locally so CI lints exactly the same files.
      - name: Run shellcheck (via the pre-commit hook)
        run: ./hooks/pre-commit
